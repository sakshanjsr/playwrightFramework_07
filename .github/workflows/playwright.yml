name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      env:
        description: Select environment
        required: true
        default: qa
        type: choice
        options:
          - dev
          - qa
          - prod
      suite:
        description: Select test suite
        required: true
        default: smoke
        type: choice
        options:
        - smoke
        - regression
        - sanity

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          SUITE=${{ github.event.inputs.suite || 'smoke' }}
          npx playwright test --grep "@$SUITE"
        env:
          ENV: ${{ github.event.inputs.env || 'qa' }}

      - name: Build Docker image
        run: docker build -t playwright-tests .

      - name: Run Playwright tests in Docker
        run: |
          docker run --rm \
            --ipc=host \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            playwright-tests

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Set Email Status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "EMAIL_STATUS=PASSED" >> $GITHUB_ENV
          else
            echo "EMAIL_STATUS=FAILED" >> $GITHUB_ENV
          fi

      - name: Create Email Body
        if: always()
        run: |
          echo "Hello Team," > email.txt
          echo "" >> email.txt
          echo "The Playwright execution has completed." >> email.txt
          echo "" >> email.txt
          echo "Environment: ${{ github.event.inputs.env || 'qa' }}" >> email.txt
          echo "Suite: ${{ github.event.inputs.suite || 'smoke' }}" >> email.txt
          echo "Build: #${{ github.run_number }}" >> email.txt
          echo "Status: $EMAIL_STATUS" >> email.txt
          echo "" >> email.txt
          echo "Allure Report:" >> email.txt
          echo "https://sakshanjsr.github.io/playwrightFramework_07/" >> email.txt
          echo "" >> email.txt
          echo "Pipeline:" >> email.txt
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> email.txt

      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Playwright ${{ github.event.inputs.suite || 'smoke' }} - ${{ env.EMAIL_STATUS }}
          to: sakshanjsr@gmail.com
          from: GitHub Actions
          body: file://email.txt

      
      
